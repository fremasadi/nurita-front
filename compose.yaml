name: nurita

x-app: &app
  image: nurita-app:${IMAGE_TAG:-latest}
  env_file:
    - .env.docker
  restart: unless-stopped
  volumes:
    - app-storage:/var/www/html/storage
  depends_on:
    db:
      condition: service_healthy

services:
  app:
    <<: *app
    build:
      context: .
      target: app
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      target: web
    image: nurita-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - app-storage:/var/www/html/storage:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  queue:
    <<: *app
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90"]
    stop_grace_period: 2m

  scheduler:
    <<: *app
    command: ["php", "artisan", "schedule:work"]

  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-db_nurita}
      MARIADB_USER: ${DB_USERNAME:-nurita}
      MARIADB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.docker}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env.docker}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  app-storage:
  db-data:
